name: CI Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  ############################################################################
  # Stage 1: Validate PR Title (Conventional Commits)
  ############################################################################
  validate-pr-title:
    name: "Stage 1: Validate PR Title"
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            perf
            revert
            breaking

  ############################################################################
  # Stage 2: Security Scan (tfsec + checkov)
  ############################################################################
  security-scan:
    name: "Stage 2: Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          additional_args: "--minimum-severity MEDIUM"

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: CKV_AWS_111,CKV_AWS_356

  ############################################################################
  # Stage 3: TFLint
  ############################################################################
  tflint:
    name: "Stage 3: TFLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.63.1"

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --format compact

  ############################################################################
  # Stage 4: Terraform Format
  ############################################################################
  terraform-fmt:
    name: "Stage 4: Terraform Format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  ############################################################################
  # Stage 5: Terraform Validate
  ############################################################################
  terraform-validate:
    name: "Stage 5: Terraform Validate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  ############################################################################
  # Stage 6: Terraform Plan (examples)
  ############################################################################
  terraform-plan:
    name: "Stage 6: Terraform Plan"
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    strategy:
      matrix:
        example: [complete]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Init
        working-directory: examples/${{ matrix.example }}
        run: terraform init -backend=false

      - name: Terraform Validate Example
        working-directory: examples/${{ matrix.example }}
        run: terraform validate

      - name: Terraform Plan (dry-run)
        working-directory: examples/${{ matrix.example }}
        run: terraform plan -input=false -no-color
        continue-on-error: true
        env:
          AWS_DEFAULT_REGION: eu-west-1

  ############################################################################
  # Stage 7: Docs Check
  ############################################################################
  docs-check:
    name: "Stage 7: Docs Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: .
          output-file: README.md
          fail-on-diff: true

  ############################################################################
  # Summary Gate
  ############################################################################
  ci-passed:
    name: "CI Passed"
    runs-on: ubuntu-latest
    needs:
      - validate-pr-title
      - security-scan
      - tflint
      - terraform-fmt
      - terraform-validate
      - terraform-plan
      - docs-check
    if: always()
    steps:
      - name: Check all stages passed
        run: |
          if [[ "${{ needs.validate-pr-title.result }}" != "success" ]] || \
             [[ "${{ needs.security-scan.result }}" != "success" ]] || \
             [[ "${{ needs.tflint.result }}" != "success" ]] || \
             [[ "${{ needs.terraform-fmt.result }}" != "success" ]] || \
             [[ "${{ needs.terraform-validate.result }}" != "success" ]] || \
             [[ "${{ needs.terraform-plan.result }}" != "success" ]] || \
             [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "❌ One or more CI stages failed"
            exit 1
          fi
          echo "✅ All CI stages passed"
