name: CI Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  ############################################################################
  # Stage 1: Validate PR Title (Conventional Commits)
  ############################################################################
  validate-pr-title:
    name: "Stage 1: Validate PR Title"
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            perf
            revert
            breaking

  ############################################################################
  # Stage 2: Security Scan (Trivy + Checkov)
  ############################################################################
  security-scan:
    name: "Stage 2: Security Scan"
    needs: [validate-pr-title]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "MEDIUM,HIGH,CRITICAL"
          exit-code: "1"

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: CKV_AWS_111,CKV_AWS_356

  ############################################################################
  # Stage 3: TFLint
  ############################################################################
  tflint:
    name: "Stage 3: TFLint"
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.63.1"

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --format compact

  ############################################################################
  # Stage 4: Terraform Format
  ############################################################################
  terraform-fmt:
    name: "Stage 4: Terraform Format"
    needs: [tflint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  ############################################################################
  # Stage 5: Terraform Validate
  ############################################################################
  terraform-validate:
    name: "Stage 5: Terraform Validate"
    needs: [terraform-fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  ############################################################################
  # Stage 6: Example Module Testing
  ############################################################################
  example-testing:
    name: "Stage 6: Example Testing (${{ matrix.example }})"
    needs: [terraform-validate]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [complete]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - name: Terraform Init (example/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: terraform init -backend=false

      - name: Terraform Validate (example/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: terraform validate

      - name: Terraform Plan (example/${{ matrix.example }})
        working-directory: examples/${{ matrix.example }}
        run: terraform plan -input=false -no-color
        continue-on-error: true
        env:
          AWS_DEFAULT_REGION: eu-west-1

  ############################################################################
  # Stage 7: Docs Check
  ############################################################################
  docs-check:
    name: "Stage 7: Docs Check"
    needs: [example-testing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: .
          output-file: README.md
          fail-on-diff: true

  ############################################################################
  # Final Gate
  ############################################################################
  ci-passed:
    name: "CI Passed"
    needs: [docs-check]
    runs-on: ubuntu-latest
    steps:
      - name: All stages passed
        run: echo "✅ All CI stages passed"
